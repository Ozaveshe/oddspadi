[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # Test fixtures contain fake sk- keys that trip smart secret detection.
  SECRETS_SCAN_OMIT_PATHS = "src/test/*"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."push-notification-sweep"]
  schedule = "*/10 * * * *"

[functions."weekly-results-recap"]
  schedule = "15 6 * * 1"

[functions."editorial-generation-sweep"]
  schedule = "35 5 * * *"

[dev]
  command = "npm run dev -- -H 127.0.0.1 -p 3013"
  framework = "next"
  port = 8888
  targetPort = 3013

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
